apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
spec:
  parentRefs:
    - name: default-gateway
      namespace: envoy-gateway-system # Usually where the Gateway is defined
  hostnames:
    - "grafana.172.19.0.3.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: promgraf-grafana
          port: 80
